<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ТЫ ТОЖЕ НИЧЕГО</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      background-image:
        radial-gradient(circle at top, rgba(251,229,48,0.06), transparent 35%);
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 540px;
      animation: fadeIn 1.2s ease;
      animation-fill-mode: both;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

    .logo {
      width: 100%;
      max-width: 420px;
      display: block;
      margin: 0 auto 28px;

      filter:
        drop-shadow(0 0 18px rgba(251,229,48,0.08));

      transition: 0.4s ease;
    }

    .logo:hover {
      transform: scale(1.015);
    }

    .about {
      color: #b3b3b3;
      font-size: 15px;
      line-height: 1.75;
      text-align: center;
      margin-bottom: 34px;
      padding: 0 10px;
    }

    .video-wrapper {
      position: relative;
      margin-bottom: 42px;
    }

    video {
      width: 100%;
      border-radius: 18px;
      display: block;

      box-shadow:
        0 0 40px rgba(0,0,0,0.55);
    }

    .sound-toggle {
      position: absolute;
      right: 14px;
      bottom: 14px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .sound-toggle img {
      width: 22px;
      height: 22px;
      opacity: 0.42;
      transition: transform 0.2s ease;
    }

    .sound-toggle img:hover {
      transform: scale(1.08);
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: #666;
      margin-bottom: 18px;
      text-align: center;
    }

    .links {
      margin-bottom: 38px;
    }

    .link {
      display: block;
      text-decoration: none;
      color: white;

      border: 1px solid rgba(255,255,255,0.08);

      background: rgba(255,255,255,0.025);

      padding: 16px;
      margin-bottom: 14px;
      border-radius: 14px;

      text-align: center;
      font-size: 15px;

      transition: all 0.22s ease;

      backdrop-filter: blur(4px);
    }

    .link:hover {
      transform: translateY(-2px);

      border-color: #fbe530;
      color: #fbe530;

      background: rgba(251,229,48,0.06);
    }

    .donate {
      border-color: #fbe530;
      color: #fbe530;
    }

    .donate:hover {
      background: #fbe530;
      color: black;
    }

    .bottom-photo-wrapper {
      margin-top: 52px;
      margin-bottom: 36px;
    }

    .photo {
      width: 100%;
      border-radius: 18px;
      display: block;

      filter:
        brightness(1.12)
        contrast(1.04)
        saturate(1.02);

      opacity: 0.92;

      transition: 0.35s ease;
    }

    .photo:hover {
      opacity: 1;
      transform: scale(1.01);
    }

    .mail {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 10px;
      line-height: 1.7;
    }

    .mail a {
      color: white;
      text-decoration: none;
    }

    @media (max-width: 600px) {

      body {
        padding: 24px 14px 60px;
      }

      .logo {
        margin-bottom: 24px;
      }

      .about {
        font-size: 14px;
      }

      .link {
        padding: 15px;
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" class="logo">

    <p class="about">
      отморозки из рязани играющие шумный и грязный околопанк
      про алкоголь, любовь и ярость,
      без попыток казаться приличнее
    </p>

    <div class="video-wrapper">

      <video
        id="bandVideo"
        autoplay
        muted
        loop
        playsinline
      >
        <source src="video.mp4" type="video/mp4">
      </video>

      <button class="sound-toggle" onclick="toggleSound()">
        <img id="soundIcon" src="sound-off.png" alt="sound">
      </button>

    </div>

    <div class="section-title">
      СЛУШАТЬ
    </div>

    <div class="links">

      <a class="link" href="https://open.spotify.com/artist/1QAreX9XAa4XdKZImfgkHW?si=QrYrJvqiTT6lZwYg9zd45Q" target="_blank">
        SPOTIFY
      </a>

      <a class="link" href="https://music.yandex.ru/artist/21881902" target="_blank">
        ЯНДЕКС МУЗЫКА
      </a>

      <a class="link" href="https://music.apple.com/ru/artist/ты-тоже-ничего/1737694907" target="_blank">
        APPLE MUSIC
      </a>

      <a class="link" href="https://vk.com/artist/tytozhenichego" target="_blank">
        VK MUSIC
      </a>

    </div>
    
    <div class="section-title">
      ПОДДЕРЖАТЬ
    </div>

    <a
      class="link donate"
      href="https://tips.yandex.ru/guest/payment/3224150?wl=yandex_music_dark"
      target="_blank"
    >
      ДАТЬ ДЕНЕГ
    </a>

    <div class="section-title">
      СОЦСЕТИ
    </div>

    <div class="links">
      <a class="link" href="https://t.me/uroktoo" target="_blank">
        TELEGRAM
      </a>
      <a class="link" href="https://www.instagram.com/ur0kt00/" target="_blank">
        INSTAGRAM
      </a>

      <a class="link" href="https://www.youtube.com/@uroktoo" target="_blank">
        YOUTUBE
      </a>

      <a class="link" href="https://www.tiktok.com/@uroktoo" target="_blank">
        TIKTOK
      </a>
           <a class="link" href="https://vk.com/uroktoo" target="_blank">
        VK
      </a>

    </div>



    <p class="mail">
      связь:
      <a href="mailto:m.evpraxin@ya.ru">
        m.evpraxin@ya.ru
      </a>
    </p>

  </div>

  <script>

    const video = document.getElementById("bandVideo");
    const soundIcon = document.getElementById("soundIcon");

    function toggleSound() {

      video.muted = !video.muted;

      if (video.muted) {
        soundIcon.src = "sound-off.png";
      } else {
        soundIcon.src = "sound-on.png";
      }

    }

  </script>

</body>
</html>
