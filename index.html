<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ТЫ ТОЖЕ НИЧЕГО</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 700px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
      letter-spacing: 4px;
      line-height: 1.1;
    }

    .about {
      color: #b3b3b3;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 35px;
      padding: 0 10px;
    }

    .video-wrapper {
      margin-bottom: 35px;
      position: relative;
    }

    video {
      width: 100%;
      border-radius: 16px;
      display: block;
    }

    .sound-toggle {
      position: absolute;
      bottom: 18px;
      right: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .sound-toggle img {
      width: 21px;
      height: 21px;
      opacity: 0.45;
      transition: 0.2s;
    }

    .sound-toggle img:hover {
      transform: scale(1.08);
    }

    .link {
      display: block;
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 16px;
      margin-bottom: 16px;
      transition: 0.2s;
      border-radius: 12px;
      font-size: 18px;
    }

    .link:hover {
      background: white;
      color: black;
      transform: scale(1.03);
    }

    .mail {
      margin-top: 30px;
      color: #666;
      font-size: 14px;
    }

    .mail a {
      color: white;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>ТЫ ТОЖЕ НИЧЕГО</h1>

    <p class="about">
      отморозки из рязани играющие шумный и грязный околопанк
      про алкоголь, любовь и ярость,
      без попыток казаться приличнее
    </p>

    <div class="video-wrapper">

      <video
        id="bandVideo"
        autoplay
        muted
        loop
        playsinline
      >
        <source src="video.mp4" type="video/mp4">
      </video>

      <button class="sound-toggle" onclick="toggleSound()">
        <img id="soundIcon" src="sound-off.png" alt="sound">
      </button>

    </div>

    <a class="link" href="https://band.link/uroktoo" target="_blank">
      BANDLINK
    </a>

    <a class="link" href="https://vk.com/uroktoo" target="_blank">
      VK
    </a>

    <a class="link" href="https://www.instagram.com/ur0kt00/" target="_blank">
      INSTAGRAM
    </a>

    <a class="link" href="https://www.youtube.com/@uroktoo" target="_blank">
      YOUTUBE
    </a>

    <a class="link" href="https://www.tiktok.com/@uroktoo" target="_blank">
      TIKTOK
    </a>

    <a class="link" href="https://t.me/uroktoo" target="_blank">
      TELEGRAM
    </a>

    <p class="mail">
      связь:
      <a href="mailto:m.evpraxin@ya.ru">
        m.evpraxin@ya.ru
      </a>
    </p>

  </div>

  <script>
    const video = document.getElementById("bandVideo");
    const soundIcon = document.getElementById("soundIcon");

    function toggleSound() {
      video.muted = !video.muted;

      if (video.muted) {
        soundIcon.src = "sound-off.png";
      } else {
        soundIcon.src = "sound-on.png";
      }
    }
  </script>

</body>
</html>
