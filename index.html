color: #b3b3b3;

video {

      transition: 0.2s;

    }

    .link:hover {

<script>
  const video = document.getElementById("bandVideo");
  const button = document.querySelector(".sound-btn");

  function toggleSound() {
    video.muted = !video.muted;

    if (video.muted) {
      button.innerText = "ВКЛЮЧИТЬ ЗВУК";
    } else {
      button.innerText = "ВЫКЛЮЧИТЬ ЗВУК";
